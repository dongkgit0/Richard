<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页 - X Clone</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
        }
        body {
            background-color: #F7F9FA;
            color: #0F1419;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #D7D9DC;
        }
        .logo {
            font-size: 24px;
            font-weight: 900;
            color: #1D9BF0;
        }
        .nav a {
            color: #1D9BF0;
            text-decoration: none;
            margin-left: 15px;
            font-size: 15px;
        }
        /* 发推文表单 */
        .post-box {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid #D7D9DC;
        }
        textarea {
            width: 100%;
            height: 80px;
            border: 1px solid #D7D9DC;
            border-radius: 8px;
            padding: 12px;
            font-size: 15px;
            resize: none;
            margin-bottom: 15px;
            outline: none;
        }
        textarea:focus {
            border-color: #1D9BF0;
        }
        .btn {
            padding: 10px 20px;
            background-color: #1D9BF0;
            color: white;
            border: none;
            border-radius: 20px;
            font-weight: 700;
            cursor: pointer;
        }
        .btn:hover {
            background-color: #1A8CD8;
        }
        /* 推文卡片 */
        .tweet-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid #D7D9DC;
        }
        .tweet-author {
            font-weight: 700;
            margin-bottom: 8px;
        }
        .tweet-content {
            margin-bottom: 12px;
            line-height: 1.5;
        }
        .tweet-time {
            color: #536471;
            font-size: 13px;
            margin-bottom: 12px;
        }
        .tweet-action a {
            color: #536471;
            text-decoration: none;
            margin-right: 20px;
            font-size: 14px;
        }
        .comment-box {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }
        .comment-box input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #D7D9DC;
            border-radius: 8px;
        }
        .comment-item {
            margin-top: 10px;
            padding-left: 10px;
            color: #536471;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="nav-bar">
        <div class="logo">X</div>
        <div class="nav">
            <a href="{{ url_for('explore') }}">发现</a>
            <a href="{{ url_for('user_profile', user_id=current_user.id) }}">我的主页</a>
            <a href="{{ url_for('logout') }}">退出登录</a>
        </div>
    </div>

    <!-- 发布推文区域 -->
    <div class="post-box">
        <form method="POST" action="{{ url_for('post_tweet') }}">
            <textarea name="content" maxlength="280" placeholder="分享你的想法..." required></textarea>
            <button class="btn" type="submit">发布推文</button>
        </form>
    </div>

    <!-- 时间线推文列表 -->
    {% for tweet in tweets %}
    <div class="tweet-card">
        <div class="tweet-author">@{{ tweet.author.username }}</div>
        <div class="tweet-content">{{ tweet.content }}</div>
        <div class="tweet-time">{{ tweet.timestamp }}</div>
        <div class="tweet-action">
            <a href="{{ url_for('like', tweet_id=tweet.id) }}">👍 点赞({{ tweet.likes.count() }})</a>
        </div>

        <form method="POST" action="{{ url_for('comment', tweet_id=tweet.id) }}" class="comment-box">
            <input name="content" placeholder="输入评论..." required>
            <button class="btn" type="submit">发送</button>
        </form>

        {% for c in tweet.comments %}
        <div class="comment-item">
            <b>@{{ c.user.username }}:</b> {{ c.content }}
        </div>
        {% endfor %}
    </div>
    {% endfor %}
</body>
</html>
