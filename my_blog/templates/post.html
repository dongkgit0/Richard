<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <style>
        body {
            margin: 0;
            padding: 20px 10px;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #fff9ec, #ffe8d8, #ffd9e0, #fcf0e3);
            background-attachment: fixed;
            background-color: #fff9ec;
            background-repeat: no-repeat;
        }
        .post-box {
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            background: white;
            padding: 30px 25px;
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }
        .post-title {
            font-size: 32px;
            font-weight: bold;
            margin: 0 0 12px 0;
            padding-bottom: 12px;
            border-bottom: 1px solid #eee;
        }
        .post-content {
            font-family: Arial, sans-serif;
            font-size: 15px;
            line-height: 1.42;
            white-space: pre-wrap;
            word-wrap: break-word;
            margin: 0;
            padding: 0;
        }
        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 30px;
        }
        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 15px;
            border: 1px solid #ff6600;
            color: #ff6600;
            background: transparent;
        }
        .btn-edit {
            background: #ff6600;
            color: white;
            border: none;
        }
        .btn-delete {
            background: red;
            color: white;
            border: none;
        }
    </style>
</head>
<body>
    <div class="post-box">
        <div class="post-title">{{ title }}</div>
        <div class="post-content">{{ content }}</div>
        <div class="btn-group">
            <a href="/" class="btn">← 返回首页</a>
            <a href="{{ url_for('edit_post', post_id=post_id) }}" class="btn btn-edit">✏️ 编辑本篇文章</a>
            <form action="{{ url_for('delete_post', post_id=post_id) }}" method="post" style="margin:0">
                <button class="btn btn-delete">🗑️ 删除本篇文章</button>
            </form>
        </div>
    </div>
</body>
</html>
